services:
  postgres:
    image: postgres:16-alpine
    container_name: remote-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: guacamole_password
    volumes:
      - guacamole-postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole_user -d guacamole_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: remote-service-guacd
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.6.0
    container_name: remote-service-guacamole
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole_user
      POSTGRESQL_PASSWORD: guacamole_password
      REMOTE_IP_VALVE_ENABLED: "true"
    ports:
      - "13500:8080"

  https-proxy:
    image: nginx:1.27-alpine
    container_name: remote-service-https-proxy
    restart: unless-stopped
    depends_on:
      - guacamole
    ports:
      - "13543:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/certs:ro

  notifier:
    build:
      context: ./notifier
    container_name: remote-service-notifier
    restart: unless-stopped
    profiles:
      - notifier
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./notifier/.env

volumes:
  guacamole-postgres-data:
